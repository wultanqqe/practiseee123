<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Profile Style</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header class="profile-header">
            <div class="profile-avatar-section">
                <div class="profile-avatar">
                    <img src="images/avatar.jpg" alt="Аватар">
                </div>
            </div>

            <div class="profile-info-section">
                <div class="profile-top-row">
                    <h2 class="username">wultanqqe</h2>

                </div>

                <ul class="profile-stats">
                    <li><strong>3</strong> публикаций</li>
                    <li><strong>67k</strong> подписчиков</li>
                    <li><strong>52</strong> подписок</li>
                </ul>

                <div class="profile-bio">
                    <h1 class="full-name">Ермек Султан</h1>
                    <p class="category">Личный блог</p>
                    <p class="bio-text">гений филантроп бизнесмен</p>
                    <a href="t.me/wultanqqe" class="bio-link" target="_blank">t.me/wultanqqe</a>
                </div>
            </div>
        </header>

        <div class="profile-tabs">
            <a href="#" class="tab-item active"><i class="fas fa-th"></i> Публикации</a>
        </div>

        <main class="posts-grid">
            <div class="post-item">
                <img src="images/post1.jpg" alt="Пост">
                <div class="post-overlay">
                </div>
            </div>
            <div class="post-item">
                <img src="images/post2.jpg" alt="Пост">
                <div class="post-overlay">
   
                </div>
            </div>
            <div class="post-item">
                <img src="images/post3.png" alt="Пост">
                <div class="post-overlay">
            
                </div>
      </div>
      <button class="theme-toggle-btn" onclick="changeTheme()">Переключить тему</button>
      <script src="script.js"></script>
      <a href="library.html" target="_blank">Библиотека</a>
</body>
</html>
